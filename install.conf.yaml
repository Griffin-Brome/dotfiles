- clean: ['~']

- link:
    ~/.gitconfig: gitconfig
    ~/.tmux.conf: tmux.conf 
    ~/bin:
        path: bin/
        create: true
    ~/.config/nvim/init.vim: 
        path: vim/init.vim
        relink: true
    ~/.config/fish:
        path: fish/
        create: true
    ~/.config/alacritty/alacritty.yml:
        path: alacritty.yml
        create: true
